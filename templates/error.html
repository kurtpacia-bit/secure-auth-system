{% extends 'base.html' %}

{% block title %}Error - SecureAuth{% endblock %}

{% block content %}
<div class="auth-card" style="text-align: center;">
    <h1 class="card-title" style="font-size: 48px; margin-bottom: 20px;">{{ error_code }}</h1>
    <p class="card-subtitle" style="font-size: 18px; margin-bottom: 30px;">{{ error_message }}</p>
    
    <a href="{{ url_for('index') }}" class="btn btn-primary">
        <span>🏠</span>
        Go Home
    </a>
</div>
{% endblock %}
